<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root {
    --app-height: 100vh;
}

html, body {
    margin: 0;
    padding: 0;
    height: var(--app-height);
    overflow: hidden;
    font-family: Arial;
    background: #050507;
    color: white;
}

/* 🔥 BACKGROUND GAME STYLE */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        linear-gradient(rgba(0,255,150,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,150,0.06) 1px, transparent 1px);
    background-size: 60px 60px;
}

body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, rgba(0,255,150,0.15), transparent 60%);
}

/* CONTAINER */
.container {
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding-bottom: 60px;
}

/* TITLE */
.title {
    font-size: 26px;
    font-weight: bold;
    letter-spacing: 2px;
}

.subtitle {
    opacity: 0.5;
    margin-bottom: 20px;
}

/* 🔥 CIRCLE ULTRA */
.circle {
    position: relative;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle, #0a0a0c, #000);
    box-shadow:
        0 0 40px rgba(0,255,150,0.2),
        inset 0 0 30px rgba(0,255,150,0.1);
}

/* aura */
.circle::before {
    content: "";
    position: absolute;
    width: 240px;
    height: 240px;
    border-radius: 50%;
    border: 2px solid rgba(0,255,150,0.3);
    animation: spin 6s linear infinite;
}

.circle::after {
    content: "";
    position: absolute;
    width: 270px;
    height: 270px;
    border-radius: 50%;
    border: 1px dashed rgba(0,255,150,0.2);
    animation: spin 14s linear infinite reverse;
}

@keyframes spin {
    from { transform: rotate(0); }
    to { transform: rotate(360deg); }
}

/* VALUE */
.value {
    font-size: 36px;
    font-weight: bold;
    color: #00ff99;
    text-shadow:
        0 0 10px rgba(0,255,150,0.8),
        0 0 20px rgba(0,255,150,0.5);
}

/* 🔥 BUTTON PREMIUM */
.button {
    width: 280px;
    margin-top: 25px;
    padding: 16px;
    border-radius: 16px;
    background: linear-gradient(90deg,#00ff99,#00c853);
    color: black;
    font-weight: bold;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 0 25px rgba(0,255,150,0.4);
}

.button:active {
    transform: scale(0.95);
    box-shadow: 0 0 10px rgba(0,255,150,0.3);
}

/* LEVEL */
.levels {
    margin-top: 15px;
}

.levels button {
    margin: 6px;
    padding: 10px 16px;
    border-radius: 14px;
    border: none;
    background: #111;
    color: #aaa;
    transition: 0.2s;
}

.active {
    background: #ffd600 !important;
    color: black;
    box-shadow: 0 0 15px #ffd600;
}

/* LIVE */
.live {
    position: absolute;
    bottom: 15px;
    left: 20px;
    font-size: 13px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">

<div class="title">HACK BOT</div>
<div class="subtitle">AI Soft v2.0</div>

<div class="circle">
    <div id="result" class="value">AI</div>
</div>

<div class="button" onclick="predict()">PREDICT</div>

<div>Level:</div>

<div class="levels">
    <button onclick="setLevel('easy')">Easy</button>
    <button onclick="setLevel('medium')" class="active">Medium</button>
    <button onclick="setLevel('hard')">Hard</button>
    <button onclick="setLevel('hardcore')">Hardcore</button>
</div>

<div id="live" class="live"></div>

</div>

<script>
const tg = window.Telegram.WebApp;

/* 🔥 FIX HEIGHT */
function setHeight() {
    let h = window.innerHeight;
    if (tg && tg.viewportHeight) h = tg.viewportHeight;
    document.documentElement.style.setProperty('--app-height', h + 'px');
}

tg.expand();
setHeight();
tg.onEvent('viewportChanged', setHeight);
window.addEventListener('resize', setHeight);

/* LOGIC */
let level = "medium";

function setLevel(l) {
    level = l;
    document.querySelectorAll(".levels button").forEach(b => b.classList.remove("active"));
    event.target.classList.add("active");
}

const data = {
    easy: ["1.30x","1.56x","2.12x","2.70x","2.96x","3.28x","4.11x"],
    medium: ["1.42x","1.75x","1.98x","2.28x","2.47x","2.70x","3.28x"],
    hard: ["1.46x","1.83x","2.31x","2.95x","3.82x","5.02x"],
    hardcore: ["1.44x","2.21x","3.45x"]
};

function predict() {
    let el = document.getElementById("result");
    el.innerHTML = "...";

    setTimeout(() => {
        let arr = data[level];
        let random = arr[Math.floor(Math.random() * arr.length)];
        el.innerHTML = random;
    }, 900);

    let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
    audio.play();

    if (navigator.vibrate) navigator.vibrate(100);
}

const names = ["Alex","Mark","John","Ivan","Leo","Chris"];

function liveWins() {
    let name = names[Math.floor(Math.random()*names.length)];
    let x = (Math.random()*5+1).toFixed(2);
    document.getElementById("live").innerHTML = name + " won " + x + "x";
}

setInterval(liveWins, 2000);

window.onload = () => {
    let el = document.getElementById("result");
    el.innerHTML = "AI ACTIVE";

    setTimeout(() => el.innerHTML = "AI", 1200);
};
</script>

</body>
</html>
